services:
  postgres:
    image: postgres:16-alpine
    container_name: denkenhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-denkenhub}
      POSTGRES_USER: ${POSTGRES_USER:-denkenhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-denkenhub123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - denkenhub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  denkenhub_postgres_data:
