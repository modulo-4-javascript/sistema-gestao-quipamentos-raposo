openapi: 3.0.3
info:
  title: DenkenHub Resource Management API
  version: 1.0.0
  description: >-
    API para gerenciar equipamentos, localizações, status e histórico de
    movimentações no DenkenHub.
servers:
  - url: http://localhost:3000/api/v1
    description: Ambiente local de desenvolvimento
tags:
  - name: Equipment
    description: >-
      Operações de cadastro, consulta, atualização e controle de status dos
      equipamentos
  - name: Locations
    description: >-
      Operações de cadastro, consulta, atualização e controle de status das
      localizações
  - name: History
    description: Consulta de eventos recentes e histórico de movimentação dos equipamentos
paths:
  /equipment/summary:
    get:
      tags:
        - Equipment
      summary: Buscar resumo dos equipamentos
      description: >-
        Retorna a quantidade total de equipamentos e a quantidade agrupada por
        status.
      operationId: getEquipmentSummary
      responses:
        '200':
          description: Resumo dos equipamentos retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EquipmentSummary'
  /equipment:
    get:
      tags:
        - Equipment
      summary: Listar equipamentos
      description: Lista equipamentos com suporte a busca, filtros e paginação.
      operationId: listEquipment
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/EquipmentStatusQuery'
        - $ref: '#/components/parameters/EquipmentTypeQuery'
        - $ref: '#/components/parameters/LocationIdQuery'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Lista de equipamentos retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEquipmentResponse'
    post:
      tags:
        - Equipment
      summary: Cadastrar equipamento
      description: Cria um novo equipamento no sistema.
      operationId: createEquipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEquipmentRequest'
      responses:
        '201':
          description: Equipamento cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EquipmentDetails'
        '422':
          $ref: '#/components/responses/ValidationError'
  /equipment/{equipmentId}:
    get:
      tags:
        - Equipment
      summary: Buscar equipamento por ID
      description: Retorna os dados completos de um equipamento específico.
      operationId: getEquipmentById
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: Equipamento encontrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EquipmentDetails'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Equipment
      summary: Atualizar equipamento
      description: Atualiza os dados principais de um equipamento.
      operationId: updateEquipment
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEquipmentRequest'
      responses:
        '200':
          description: Equipamento atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EquipmentDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
        - Equipment
      summary: Excluir equipamento
      description: Remove um equipamento do sistema.
      operationId: deleteEquipment
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '204':
          description: Equipamento excluído com sucesso
        '404':
          $ref: '#/components/responses/NotFound'
  /equipment/{equipmentId}/status:
    patch:
      tags:
        - Equipment
      summary: Alterar status do equipamento
      description: >-
        Atualiza apenas o status de um equipamento, sem alterar os demais dados
        cadastrais.
      operationId: updateEquipmentStatus
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEquipmentStatusRequest'
      responses:
        '200':
          description: Status do equipamento atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EquipmentDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /equipment/{equipmentId}/history:
    get:
      tags:
        - History
      summary: Listar histórico do equipamento
      description: Retorna os eventos recentes relacionados a um equipamento específico.
      operationId: listEquipmentHistory
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: Histórico do equipamento retornado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryItem'
  /locations/summary:
    get:
      tags:
        - Locations
      summary: Buscar resumo das localizações
      description: >-
        Retorna a quantidade total de localizações, localizações ativas,
        inativas e equipamentos vinculados.
      operationId: getLocationsSummary
      responses:
        '200':
          description: Resumo das localizações retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationSummary'
  /locations:
    get:
      tags:
        - Locations
      summary: Listar localizações
      description: Lista localizações com suporte a busca, filtros e paginação.
      operationId: listLocations
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/LocationStatusQuery'
        - $ref: '#/components/parameters/LocationTypeQuery'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Lista de localizações retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLocationsResponse'
    post:
      tags:
        - Locations
      summary: Cadastrar localização
      description: Cria uma nova localização para vincular equipamentos.
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '201':
          description: Localização cadastrada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDetails'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /locations/{locationId}:
    get:
      tags:
        - Locations
      summary: Buscar localização por ID
      description: Retorna os dados completos de uma localização específica.
      operationId: getLocationById
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '200':
          description: Localização encontrada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDetails'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Locations
      summary: Atualizar localização
      description: Atualiza os dados principais de uma localização.
      operationId: updateLocation
      parameters:
        - $ref: '#/components/parameters/LocationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
      responses:
        '200':
          description: Localização atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
        - Locations
      summary: Excluir localização
      description: >-
        Remove uma localização do sistema, desde que ela não possua equipamentos
        vinculados.
      operationId: deleteLocation
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '204':
          description: Localização excluída com sucesso
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: A localização possui equipamentos vinculados e não pode ser excluída
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /locations/{locationId}/status:
    patch:
      tags:
        - Locations
      summary: Alterar status da localização
      description: >-
        Atualiza apenas o status de uma localização, permitindo ativar ou
        inativar o local.
      operationId: updateLocationStatus
      parameters:
        - $ref: '#/components/parameters/LocationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationStatusRequest'
      responses:
        '200':
          description: Status da localização atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /locations/{locationId}/equipment:
    get:
      tags:
        - Locations
      summary: Listar equipamentos da localização
      description: >-
        Retorna os equipamentos que estão atualmente vinculados a uma
        localização.
      operationId: listLocationEquipment
      parameters:
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/EquipmentStatusQuery'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Equipamentos da localização retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEquipmentResponse'
  /locations/{locationId}/equipment-history:
    get:
      tags:
        - History
      summary: Listar histórico de equipamentos da localização
      description: >-
        Retorna eventos de equipamentos relacionados ao local, como entradas,
        saídas, transferências e alterações de status.
      operationId: listLocationEquipmentHistory
      parameters:
        - $ref: '#/components/parameters/LocationId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Histórico de equipamentos da localização retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEquipmentHistoryResponse'
components:
  parameters:
    EquipmentId:
      name: equipmentId
      in: path
      required: true
      description: Identificador único do equipamento.
      schema:
        type: string
        format: uuid
    LocationId:
      name: locationId
      in: path
      required: true
      description: Identificador único da localização.
      schema:
        type: string
        format: uuid
    LocationIdQuery:
      name: locationId
      in: query
      required: false
      description: Filtra equipamentos por localização.
      schema:
        type: string
        format: uuid
    Search:
      name: search
      in: query
      required: false
      description: Texto usado para buscar por nome, código, modelo, prédio ou sala.
      schema:
        type: string
        example: lab 01
    EquipmentStatusQuery:
      name: status
      in: query
      required: false
      description: Filtra equipamentos por status.
      schema:
        $ref: '#/components/schemas/EquipmentStatus'
    LocationStatusQuery:
      name: status
      in: query
      required: false
      description: Filtra localizações por status.
      schema:
        $ref: '#/components/schemas/LocationStatus'
    EquipmentTypeQuery:
      name: type
      in: query
      required: false
      description: Filtra equipamentos por tipo.
      schema:
        $ref: '#/components/schemas/EquipmentType'
    LocationTypeQuery:
      name: type
      in: query
      required: false
      description: Filtra localizações por tipo.
      schema:
        $ref: '#/components/schemas/LocationType'
    Page:
      name: page
      in: query
      required: false
      description: Número da página atual.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Quantidade de registros retornados por página.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
  responses:
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflito com regra de negócio
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Dados inválidos na requisição
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    EquipmentStatus:
      type: string
      description: Status atual do equipamento.
      enum:
        - AVAILABLE
        - IN_MAINTENANCE
        - INACTIVE
    LocationStatus:
      type: string
      description: Status atual da localização.
      enum:
        - ACTIVE
        - INACTIVE
    EquipmentType:
      type: string
      description: Tipo ou categoria do equipamento.
      enum:
        - NOTEBOOK
        - MONITOR
        - PRINTER
        - NETWORK
        - PERIPHERAL
        - OTHER
    LocationType:
      type: string
      description: Tipo ou categoria da localização.
      enum:
        - LABORATORY
        - OFFICE
        - STORAGE
        - MAINTENANCE
        - NETWORK
        - OTHER
    EquipmentHistoryType:
      type: string
      description: Tipo de evento registrado no histórico.
      enum:
        - CREATED
        - UPDATED
        - STATUS_CHANGED
        - LOCATION_CHANGED
        - LINKED_TO_LOCATION
        - REMOVED_FROM_LOCATION
        - DELETED
    EquipmentSummary:
      type: object
      description: Dados usados nos cards de resumo da tela de equipamentos.
      properties:
        total:
          type: integer
          example: 128
        available:
          type: integer
          example: 86
        inMaintenance:
          type: integer
          example: 24
        inactive:
          type: integer
          example: 18
    LocationSummary:
      type: object
      description: Dados usados nos cards de resumo da tela de localizações.
      properties:
        total:
          type: integer
          example: 8
        active:
          type: integer
          example: 7
        inactive:
          type: integer
          example: 1
        equipmentCount:
          type: integer
          example: 79
    Equipment:
      type: object
      description: Representa um equipamento cadastrado no sistema.
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: EQP-001
        name:
          type: string
          example: Dell Notebook
        type:
          $ref: '#/components/schemas/EquipmentType'
        model:
          type: string
          example: Latitude 5420
        serialNumber:
          type: string
          nullable: true
          example: DL-5420-2026
        status:
          $ref: '#/components/schemas/EquipmentStatus'
        location:
          $ref: '#/components/schemas/Location'
        updatedAt:
          type: string
          format: date-time
          example: '2026-06-25T14:35:00Z'
    EquipmentDetails:
      description: >-
        Dados completos de um equipamento, incluindo responsável, observações e
        histórico recente.
      allOf:
        - $ref: '#/components/schemas/Equipment'
        - type: object
          properties:
            responsibleUserName:
              type: string
              nullable: true
              example: Equipe de patrimonio
            createdAt:
              type: string
              format: date-time
              example: '2026-01-15T10:00:00Z'
            notes:
              type: string
              nullable: true
              example: Equipment available for practical classes.
            recentHistory:
              type: array
              items:
                $ref: '#/components/schemas/HistoryItem'
    CreateEquipmentRequest:
      type: object
      description: Dados enviados pelo front-end para cadastrar um equipamento.
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
          example: Dell Notebook
        type:
          $ref: '#/components/schemas/EquipmentType'
        model:
          type: string
          maxLength: 120
          example: Latitude 5420
        serialNumber:
          type: string
          maxLength: 80
          example: DL-5420-2026
        locationId:
          type: string
          format: uuid
          nullable: true
        responsibleUserName:
          type: string
          maxLength: 120
          nullable: true
          example: Equipe de patrimonio
        status:
          $ref: '#/components/schemas/EquipmentStatus'
        notes:
          type: string
          maxLength: 1000
          nullable: true
          example: Equipment available for practical classes.
    UpdateEquipmentRequest:
      description: Dados enviados pelo front-end para editar um equipamento.
      allOf:
        - $ref: '#/components/schemas/CreateEquipmentRequest'
    UpdateEquipmentStatusRequest:
      type: object
      description: Dados enviados para alterar somente o status de um equipamento.
      required:
        - status
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/EquipmentStatus'
        note:
          type: string
          maxLength: 500
          nullable: true
          example: Preventive maintenance completed.
    Location:
      type: object
      description: Representa uma localização onde equipamentos podem estar vinculados.
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: LAB-01
        name:
          type: string
          example: Lab 01
        type:
          $ref: '#/components/schemas/LocationType'
        building:
          type: string
          example: Main Building
        room:
          type: string
          example: '101'
        status:
          $ref: '#/components/schemas/LocationStatus'
    LocationDetails:
      description: >-
        Dados completos de uma localização, incluindo descrição e resumo dos
        equipamentos vinculados.
      allOf:
        - $ref: '#/components/schemas/Location'
        - type: object
          properties:
            floor:
              type: string
              nullable: true
              example: 1st floor
            description:
              type: string
              nullable: true
              example: Main computer laboratory for practical classes.
            equipmentCount:
              type: integer
              example: 42
            equipmentSummary:
              $ref: '#/components/schemas/EquipmentSummary'
            createdAt:
              type: string
              format: date-time
              example: '2026-01-10T10:00:00Z'
            updatedAt:
              type: string
              format: date-time
              example: '2026-06-25T14:35:00Z'
    CreateLocationRequest:
      type: object
      description: Dados enviados pelo front-end para cadastrar uma localização.
      required:
        - name
        - type
        - code
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
          example: Lab 01
        type:
          $ref: '#/components/schemas/LocationType'
        code:
          type: string
          minLength: 2
          maxLength: 20
          pattern: ^[A-Z0-9-]+$
          example: LAB-01
        building:
          type: string
          maxLength: 120
          example: Main Building
        floor:
          type: string
          maxLength: 40
          nullable: true
          example: 1st floor
        room:
          type: string
          maxLength: 40
          nullable: true
          example: '101'
        description:
          type: string
          maxLength: 1000
          nullable: true
          example: Main computer laboratory for practical classes.
        status:
          $ref: '#/components/schemas/LocationStatus'
    UpdateLocationRequest:
      description: Dados enviados pelo front-end para editar uma localização.
      allOf:
        - $ref: '#/components/schemas/CreateLocationRequest'
    UpdateLocationStatusRequest:
      type: object
      description: Dados enviados para alterar somente o status de uma localização.
      required:
        - status
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/LocationStatus'
        note:
          type: string
          maxLength: 500
          nullable: true
          example: Location temporarily disabled.
    HistoryItem:
      type: object
      description: Representa um evento simples no histórico de um equipamento.
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/EquipmentHistoryType'
        title:
          type: string
          example: Status updated
        description:
          type: string
          example: Changed from IN_MAINTENANCE to AVAILABLE.
        createdAt:
          type: string
          format: date-time
          example: '2026-06-25T14:35:00Z'
        userName:
          type: string
          nullable: true
          example: Equipe de patrimonio
    LocationEquipmentHistoryItem:
      type: object
      description: Representa um evento de equipamento relacionado a uma localização.
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/EquipmentHistoryType'
        equipment:
          $ref: '#/components/schemas/Equipment'
        fromLocation:
          $ref: '#/components/schemas/Location'
          nullable: true
        toLocation:
          $ref: '#/components/schemas/Location'
          nullable: true
        description:
          type: string
          example: Equipment moved from Storage to Lab 01.
        createdAt:
          type: string
          format: date-time
          example: '2026-06-25T14:35:00Z'
        userName:
          type: string
          nullable: true
          example: Equipe de patrimonio
    PaginatedEquipmentResponse:
      type: object
      description: Resposta paginada usada nas listagens de equipamentos.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Equipment'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedLocationsResponse:
      type: object
      description: Resposta paginada usada nas listagens de localizações.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LocationDetails'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginatedEquipmentHistoryResponse:
      type: object
      description: Resposta paginada usada no histórico de equipamentos de uma localização.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LocationEquipmentHistoryItem'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    PaginationMeta:
      type: object
      description: Metadados da paginação.
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        total:
          type: integer
          example: 124
        totalPages:
          type: integer
          example: 13
    ErrorResponse:
      type: object
      description: Resposta padrão para erros simples da API.
      properties:
        code:
          type: string
          example: RESOURCE_NOT_FOUND
        message:
          type: string
          example: Resource not found.
    ValidationErrorResponse:
      type: object
      description: Resposta padrão para erros de validação de formulário.
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Invalid request data.
        fields:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: name
              message:
                type: string
                example: Name is required.
